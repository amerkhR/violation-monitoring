services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: violation-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/ViolationMonitoring.Api
    container_name: violation-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ViolationMonitoringDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=true"
      Jwt__Issuer: "ViolationMonitoring.Api"
      Jwt__Audience: "ViolationMonitoring.Client"
      Jwt__Key: "${JWT_KEY}"
      Cors__AllowedOrigins__0: "http://localhost:5173"
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "http://localhost:5000/api"
    container_name: violation-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  sql-data:
