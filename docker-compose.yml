services:
  backend:
    build:
      context: ./backend/ViolationMonitoring.Api
      network: host
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: violation-backend
    env_file:
      - path: .env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/ViolationMonitoring.db"
      Jwt__Issuer: "ViolationMonitoring.Api"
      Jwt__Audience: "ViolationMonitoring.Client"
      Jwt__Key: "${JWT_KEY:-DEV_ONLY_CHANGE_ME_32_PLUS_CHARS_SECRET_KEY}"
    ports:
      - "5000:5000"
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/wwwroot/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      network: host
      args:
        VITE_API_BASE_URL: "http://localhost:5000/api"
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: violation-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-uploads:
